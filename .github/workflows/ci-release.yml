name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux/macOS builds for server and client
          - os: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Windows-specific: Set up MSVC for tcl2emf.cpp
      - name: Set up MSVC (Windows)
        uses: ilammy/msvc-dev-cmd@v1

      # Build server
      - name: Build Server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -v -o marinvent-server.exe ./cmd/server

      # Build client
      - name: Build Client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -v -o marinvent-cli.exe ./cmd/cli

      # Build tcl2emf (Windows only) - 32-bit build
      - name: Build tcl2emf (Windows)
        run: |
          cmd.exe /c "call ^"C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars32.bat^" && cl.exe /EHsc /MD tcl2emf.cpp /Fe:tcl2emf.exe gdi32.lib user32.lib winspool.lib"

      # Create platform-specific artifact package
      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p build-artifacts
          cp marinvent-server.exe marinvent-cli.exe tcl2emf.exe pdf_fixup_threshold.py jdmtool/* build-artifacts/
          cd build-artifacts
          7z a -tzip ../marinvent-windows-${{ matrix.goarch }}.zip *

      # Upload artifacts to workflow artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marinvent-${{ runner.os }}-${{ matrix.goarch }}
          path: |
            marinvent-*.zip
          retention-days: 30

      # Store build outputs for release
      - name: Store Build Outputs
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.goarch }}
          path: marinvent-*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          pattern: release-assets-*

      - name: Prepare Release Assets
        run: |
          mkdir -p release-files
          find release-downloads -name "marinvent-*.zip" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/marinvent-*.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
