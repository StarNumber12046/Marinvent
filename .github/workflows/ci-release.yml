name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Package
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate OpenAPI Docs
        run: |
          go install github.com/swaggo/swag/cmd/swag@latest
          swag init -g cmd/server/main.go -o docs --parseInternal

      - name: Build Server (32-bit for DLL support)
        env:
          GOARCH: "386"
          CGO_ENABLED: "0"
        run: |
          go build -v -o marinvent-server.exe ./cmd/server

      - name: Build CLI (64-bit)
        env:
          GOARCH: "amd64"
          CGO_ENABLED: "0"
        run: |
          go build -v -o marinvent-cli.exe ./cmd/cli

      - name: Setup MSVC (Developer Command Prompt)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build tcl2emf (32-bit C++)
        run: |
          cl.exe /EHsc /MD tcl2emf.cpp /Fe:tcl2emf.exe gdi32.lib user32.lib winspool.lib

      - name: Build georef (32-bit C++)
        run: |
          cl.exe /EHsc /MD georef.cpp /Fe:georef.exe gdi32.lib user32.lib winspool.lib

      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p build-artifacts
          cp marinvent-server.exe marinvent-cli.exe tcl2emf.exe georef.exe pdf_fixup_threshold.py build-artifacts/
          cp -r jdmtool build-artifacts/ 2>/dev/null || true
          cd build-artifacts
          7z a -tzip ../marinvent-windows.zip *

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: marinvent-windows
          path: marinvent-windows.zip
          retention-days: 30

      - name: Store Build Outputs
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: marinvent-windows.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-downloads
          pattern: release-assets-*

      - name: Prepare Release Assets
        run: |
          mkdir -p release-files
          find release-downloads -name "marinvent-*.zip" -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/marinvent-*.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
